# ============================================================================
# Malha IA v4.0.4 — Workflow 1/4: CLASSIFICAÇÃO
# Roda a cada 15 min, processa 1 lote (15 chamados) com LSTM, encerra.
# Salvar em: .github/workflows/classificacao.yml
# ============================================================================
name: 1 - Classificacao (rapido)

concurrency:
  group: malha-ia-classificacao
  cancel-in-progress: false

on:
  schedule:
    - cron: '*/15 * * * *'    # a cada 15 minutos
  workflow_dispatch:

jobs:
  classificar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r execucao_offline/requirements.txt

      - name: Reconstruir credenciais Google
        env:
          AUTENTICACAO_GOOGLE: ${{ secrets.AUTENTICACAO_GOOGLE }}
        run: |
          echo "$AUTENTICACAO_GOOGLE" | base64 -d > autenticacao_google.json
          echo "{}" > chaves_api.json

      - name: Executar classificacao
        run: python motor_v36.py --apenas-classificacao
