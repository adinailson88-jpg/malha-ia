# ============================================================================
# Malha IA v4.0.3 — Backup cloud (GitHub Actions, gratuito)
# ----------------------------------------------------------------------------
# Concurrency: garante que SÓ 1 execução roda por vez. Se um cron dispara
# enquanto outro ainda está rodando, o novo entra na fila em vez de
# executar em paralelo (evita conflito de escrita no Google Sheets).
# Cron a cada 1h: cada ciclo pode demorar 25-30 min com previsão completa,
# então 1×/h faz mais sentido que 4×/h (que empilharia execuções).
# ----------------------------------------------------------------------------
name: Malha IA - Ciclo Periodico

concurrency:
  group: malha-ia-ciclo
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 * * * *'       # a cada 1 hora (no minuto :00)
  workflow_dispatch:           # permite trigger manual

jobs:
  ciclo:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r execucao_offline/requirements.txt

      - name: Reconstruir credenciais Google a partir dos Secrets
        env:
          AUTENTICACAO_GOOGLE: ${{ secrets.AUTENTICACAO_GOOGLE }}
          CHAVES_API: ${{ secrets.CHAVES_API }}
        run: |
          echo "$AUTENTICACAO_GOOGLE" | base64 -d > autenticacao_google.json
          echo "$CHAVES_API" | base64 -d > chaves_api.json || echo "{}" > chaves_api.json

      - name: Executar um ciclo do motor
        env:
          MOTOR_MAX_CICLOS: '1'
        run: python motor_v36.py --ciclo-unico
