# ============================================================================
# Malha IA v4.0.4 — Workflow 2/4: PREVISÃO GLOBAL
# Roda a cada 6h, faz 8 modelos + ensemble sobre a série total da UFSB.
# Gera 14 abas PREVISAO_* (sem sufixo).
# Salvar em: .github/workflows/previsao_global.yml
# ============================================================================
name: 2 - Previsao Global (medio)

concurrency:
  group: malha-ia-previsao-global
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 */6 * * *'     # a cada 6 horas (00h, 06h, 12h, 18h UTC)
  workflow_dispatch:

jobs:
  previsao_global:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r execucao_offline/requirements.txt

      - name: Reconstruir credenciais Google
        env:
          AUTENTICACAO_GOOGLE: ${{ secrets.AUTENTICACAO_GOOGLE }}
        run: |
          echo "$AUTENTICACAO_GOOGLE" | base64 -d > autenticacao_google.json
          echo "{}" > chaves_api.json

      - name: Executar previsao global
        run: python motor_v36.py --apenas-previsao-global
